<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WANICKI – Raport Maszyny</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
:root {
  --green:#367C2B; --green2:#4a9e3a; --orange:#e07b39;
  --red:#cc2222; --blue:#1565c0; --dark:#2d2d2d;
  --mid:#555; --muted:#888; --light:#f5f5f3;
  --border:#e0e0e0; --white:#fff;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Source Sans 3',sans-serif; background:#e8eae5; color:var(--dark); }

/* ── TOPBAR ── */
.topbar { background:#1a1a1a; padding:13px 28px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; }
.wlogo { font-size:19px; font-weight:700; color:#fff; }
.wlogo em { color:var(--green); font-style:normal; }
.wlogo-sub { font-size:10px; color:#555; letter-spacing:2px; text-transform:uppercase; margin-top:1px; }
.jd-pill { background:var(--green); color:#fff; font-size:10px; font-weight:700; padding:5px 13px; border-radius:20px; letter-spacing:1px; text-transform:uppercase; }

/* ── UPLOAD ── */
#uploadScreen { min-height:calc(100vh - 50px); display:flex; align-items:center; justify-content:center; padding:40px 20px; }
.upload-wrap { width:100%; max-width:560px; }
.upload-zone {
  background:var(--white); border:2.5px dashed var(--border);
  border-radius:14px; padding:52px 36px; text-align:center;
  cursor:pointer; transition:all .2s; margin-bottom:14px;
}
.upload-zone:hover,.upload-zone.drag { border-color:var(--green); background:#f4fbf2; }
.upload-zone.loaded { border-color:var(--green); border-style:solid; background:#f4fbf2; }
.upload-zone input { display:none; }
.u-ico { font-size:46px; margin-bottom:14px; }
.u-title { font-size:21px; font-weight:700; margin-bottom:7px; }
.u-hint { font-size:13px; color:var(--muted); }
.u-hint2 { font-size:11px; color:var(--muted); margin-top:6px; }
.fname { display:none; margin-top:12px; font-size:13px; font-weight:600; color:var(--green); }
.fname.on { display:block; }
.sbar { padding:11px 16px; border-radius:8px; font-size:13px; font-weight:600; display:none; margin-bottom:12px; border:1px solid; }
.sbar.on { display:block; }
.si { background:#e3f2fd; color:#1565c0; border-color:#90caf9; }
.sok { background:#e8f5e9; color:#2e7d32; border-color:#a5d6a7; }
.serr { background:#ffebee; color:#c62828; border-color:#ef9a9a; }

/* progress bar */
.progress-wrap { display:none; margin-bottom:12px; }
.progress-wrap.on { display:block; }
.progress-bar { height:6px; background:#e0e0e0; border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:var(--green); border-radius:3px; transition:width .3s; width:0%; }
.progress-txt { font-size:11px; color:var(--muted); margin-top:4px; text-align:center; }

.btn { width:100%; background:var(--green); color:#fff; border:none; cursor:pointer;
  font-family:inherit; font-size:16px; font-weight:700; letter-spacing:1.5px;
  text-transform:uppercase; padding:15px; border-radius:12px;
  transition:all .2s; box-shadow:0 4px 16px rgba(54,124,43,.3); display:none; }
.btn.on { display:block; }
.btn:hover { background:var(--green2); transform:translateY(-1px); }

/* ── PRINT BAR ── */
.print-bar { background:#1a1a1a; padding:9px 24px; display:flex; align-items:center; justify-content:space-between; }
.pb-logo { font-size:14px; font-weight:700; color:#fff; }
.pb-logo em { color:var(--green); font-style:normal; }
.pb-btns { display:flex; gap:8px; }
.pb-btn { font-family:inherit; font-size:12px; font-weight:700; letter-spacing:1px;
  text-transform:uppercase; padding:7px 16px; border-radius:7px; cursor:pointer; border:none; }
.pb-print { background:var(--green); color:#fff; }
.pb-back  { background:#333; color:#aaa; }

/* ── REPORT ── */
#reportView { display:none; background:#e8eae5; }
#reportView.on { display:block; }

.page { width:210mm; margin:20px auto; background:var(--white); position:relative; overflow:hidden; }
.page-inner { padding:10mm 13mm 14mm; position:relative; }

/* decorative arcs */
.deco { position:absolute; right:0; top:0; width:110px; height:100%; pointer-events:none; }
.deco svg { width:100%; height:100%; }

/* cover */
.cover-inner { padding:22mm 18mm; min-height:295mm; display:flex; flex-direction:column; }
.c-logo { font-size:30px; font-weight:700; color:var(--dark); border-bottom:2.5px solid var(--dark); display:inline-block; padding-bottom:4px; margin-bottom:28mm; }
.c-logo em { font-style:italic; }
.c-title { font-size:44px; font-weight:300; color:var(--dark); line-height:1.1; letter-spacing:-1px; margin-bottom:22mm; }
.c-sub { font-size:11px; color:var(--green); font-weight:600; margin-bottom:8px; }
.jd-box { display:inline-flex; align-items:center; gap:11px; border:1px solid #ddd; border-radius:8px; padding:10px 14px; }
.jd-icon-box { width:38px; height:38px; background:var(--green); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:18px; }
.jd-t1 { font-size:15px; font-weight:700; color:var(--green); }
.jd-t2 { font-size:8.5px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
.c-serial { margin-top:auto; margin-bottom:8mm; font-size:12px; color:var(--mid); }

/* footer */
.pg-footer { background:#4a4a4a; margin-left:-13mm; margin-right:-13mm; padding:8px 13mm; display:flex; align-items:center; justify-content:space-between; }
.pgf-arr { color:#666; font-size:11px; }
.pgf-slogan { font-size:10px; color:#aaa; }
.pgf-slogan b { color:#fff; }
.pgf-logo { font-size:12px; font-weight:700; color:#fff; }
.pgf-logo em { font-style:italic; }

/* cover footer */
.c-footer { background:#4a4a4a; margin-left:-18mm; margin-right:-18mm; padding:10px 18mm; display:flex; align-items:center; justify-content:space-between; margin-top:auto; }

/* page header */
.pg-hdr { display:flex; align-items:center; justify-content:space-between; padding-bottom:7px; border-bottom:1px solid var(--border); margin-bottom:7px; }
.pg-hdr-logo { font-size:13px; font-weight:700; color:var(--dark); }
.pg-hdr-logo em { font-style:italic; }
.pg-hdr-org { font-size:11px; font-weight:700; text-align:center; color:var(--dark); max-width:55%; }
.pg-hdr-org small { display:block; font-size:9px; color:var(--muted); font-weight:400; }
.pg-hdr-jd { width:30px; height:30px; background:var(--green); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:15px; }

/* machine info rows */
.mi-grid { display:grid; grid-template-columns:repeat(4,1fr); border-bottom:1px solid var(--border); padding:6px 0; }
.mi-cell { text-align:center; }
.mi-val { font-size:12.5px; font-weight:700; }
.mi-lbl { font-size:8.5px; color:var(--muted); margin-top:1px; }
.dates-grid { display:grid; grid-template-columns:1fr 1fr; padding:6px 0; border-bottom:1px solid var(--border); }
.dc { text-align:center; }
.dc-val { font-size:13px; font-weight:700; }
.dc-lbl { font-size:8.5px; color:var(--muted); }
.dots { display:flex; gap:5px; padding:5px 0; }
.dot { width:7px; height:7px; border-radius:50%; background:var(--border); }

/* layout */
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-top:7px; }
.chart-lbl { font-size:10px; color:var(--dark); margin-bottom:4px; }

/* big numbers */
.bnum { font-size:26px; font-weight:700; }
.bnum.orange { color:var(--orange); }
.bnum.dark   { color:var(--dark); }
.blbl { font-size:9px; color:var(--muted); }

/* info text */
.info-txt { font-size:10px; line-height:1.55; color:var(--dark); }
.info-txt.right { text-align:right; }
.hl-or  { color:var(--orange); font-weight:600; }
.hl-gr  { color:var(--green);  font-weight:700; }

/* recommendations */
.rec { font-size:11px; font-weight:700; margin:5px 0; }
.rec.green  { color:var(--green); }
.rec.orange { color:var(--orange); }

/* tables */
.rt { width:100%; border-collapse:collapse; font-size:9.5px; margin-bottom:7px; }
.rt th { background:#f0f0ee; font-weight:700; padding:5px 6px; text-align:left; border-bottom:1.5px solid var(--border); font-size:9px; color:var(--mid); }
.rt td { padding:5px 6px; border-bottom:1px solid #f0f0f0; }
.rt tr:nth-child(even) td { background:#fafaf9; }
.rt tr:last-child td { border-bottom:none; }
.ok  { color:var(--green); font-weight:700; }
.bad { color:var(--red);   font-weight:700; }
.inf { color:var(--blue);  font-weight:700; }

/* metric strip */
.mstrip { display:grid; gap:6px; }
.mstrip.c2 { grid-template-columns:1fr 1fr; }
.mstrip.c3 { grid-template-columns:1fr 1fr 1fr; }
.mval { font-size:19px; font-weight:700; color:var(--dark); }
.mlbl { font-size:9px; color:var(--muted); }

.at-pct { font-size:30px; font-weight:700; color:var(--dark); text-align:right; }
.at-lbl { font-size:9px; color:var(--muted); text-align:right; }

.pagebreak { page-break-after:always; break-after:page; }
hr.divider { border:none; border-top:1px solid var(--border); margin:8px 0; }

/* ── PRINT ── */
@media print {
  body { background:white; }
  #uploadScreen,#topbar,.print-bar { display:none !important; }
  #reportView { display:block !important; background:white; }
  .page { margin:0; width:100%; box-shadow:none; }
  .pagebreak { page-break-after:always; }
  @page { size:A4; margin:0; }
}
@media screen {
  .page { box-shadow:0 4px 32px rgba(0,0,0,.1); }
  #reportView { padding-bottom:40px; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar" id="topbar">
  <div>
    <div class="wlogo"><em>W</em>ANICKI</div>
    <div class="wlogo-sub">Generator raportów maszyn</div>
  </div>
  <div class="jd-pill">John Deere Operations Center</div>
</div>

<!-- UPLOAD -->
<div id="uploadScreen">
  <div class="upload-wrap">
    <div class="upload-zone" id="dz" onclick="document.getElementById('fi').click()">
      <div class="u-ico">📄</div>
      <div class="u-title">Wrzuć raport PDF z John Deere</div>
      <div class="u-hint">Kliknij lub przeciągnij plik .pdf tutaj</div>
      <div class="u-hint2">Eksport „Wszystkie dane maszyny" z Operations Center</div>
      <div class="fname" id="fname"></div>
      <input type="file" id="fi" accept=".pdf">
    </div>
    <div class="progress-wrap" id="progWrap">
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
      <div class="progress-txt" id="progTxt">Wczytuję PDF...</div>
    </div>
    <div class="sbar" id="sbar"></div>
    <button class="btn" id="btnShow" onclick="showReport()">📊 POKAŻ RAPORT</button>
  </div>
</div>

<!-- REPORT -->
<div id="reportView">
  <div class="print-bar">
    <div class="pb-logo"><em>W</em>ANICKI — Raport Maszyny</div>
    <div class="pb-btns">
      <button class="pb-btn pb-back" onclick="goBack()">← Wróć</button>
      <button class="pb-btn pb-print" onclick="window.print()">🖨️ DRUKUJ / PDF</button>
    </div>
  </div>
  <div id="rc"></div>
</div>

<script>
// ══ PDF.js setup ═══════════════════════════════════════════════════════════════
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let D = null;

// ══ FILE HANDLING ══════════════════════════════════════════════════════════════
const dz = document.getElementById('dz');
const fi = document.getElementById('fi');
dz.addEventListener('dragover', e=>{e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave', ()=>dz.classList.remove('drag'));
dz.addEventListener('drop', e=>{e.preventDefault();dz.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)loadPDF(f)});
fi.addEventListener('change', e=>{if(e.target.files[0])loadPDF(e.target.files[0])});

function setStatus(msg,type){
  const el=document.getElementById('sbar');
  el.textContent=msg; el.className='sbar on '+type;
}
function setProgress(pct,txt){
  document.getElementById('progWrap').classList.add('on');
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progTxt').textContent=txt;
}

async function loadPDF(file){
  if(!file.name.toLowerCase().endsWith('.pdf')){setStatus('Proszę wybrać plik .pdf','serr');return;}
  document.getElementById('fname').textContent='📎 '+file.name;
  document.getElementById('fname').classList.add('on');
  dz.classList.add('loaded');
  setProgress(10,'Wczytuję PDF...');

  try {
    const ab = await file.arrayBuffer();
    setProgress(30,'Parsowanie stron...');
    const pdf = await pdfjsLib.getDocument({data:ab}).promise;
    const pages = [];
    for(let i=1;i<=pdf.numPages;i++){
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      pages.push(content.items.map(it=>it.str).join(' '));
      setProgress(30+Math.round(i/pdf.numPages*50), `Strona ${i}/${pdf.numPages}...`);
    }
    const allText = pages.join('\n');
    setProgress(85,'Analizuję dane...');
    D = parsePDF(allText, pages);
    setProgress(100,'Gotowe!');
    setStatus('✅ Dane wczytane! Kliknij "POKAŻ RAPORT"','sok');
    document.getElementById('btnShow').classList.add('on');
  } catch(err){
    setStatus('❌ Błąd parsowania: '+err.message,'serr');
    console.error(err);
  }
}

// ══ PDF PARSER ═════════════════════════════════════════════════════════════════
function parsePDF(text, pages){
  // Helper: extract number after label
  const num = (label, src=text, def=0) => {
    const rx = new RegExp(label.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*([\\d.,]+)','i');
    const m = src.match(rx);
    if(!m) return def;
    return parseFloat(m[1].replace(',','.')) || def;
  };
  const str = (label, src=text) => {
    const rx = new RegExp(label+'\\s*(.+?)(?=\\n|$)','i');
    const m = src.match(rx);
    return m ? m[1].trim() : '';
  };

  // Serial / dates from page 1
  const p1 = pages[0]||'';
  const serialM = p1.match(/([A-Z0-9]{17})/);
  const serial = serialM ? serialM[1] : '';
  const dateM = p1.match(/(\d+\.\d+\.\d+[^\n]+do[^\n]+\d{4})/);
  const dateRange = dateM ? dateM[0] : '';
  const dateparts = dateRange.match(/(\d+\.\d+\.\d+[^d]+)\s*do\s*(.+)/);

  // Machine state utilisation (page 10)
  const p10 = pages[9]||'';
  const idle_fuel  = num('Śr. zużycie paliwa \\(l\\/hr\\)\\s*([\\d.,]+)\\s*([\\d.,]+)\\s*([\\d.,]+)', p10) || (() => {
    const m=p10.match(/Śr\. zużycie paliwa \(l\/hr\)\s*([\d.,]+)\s*([\d.,]+)\s*([\d.,]+)/);
    return m?parseFloat(m[1].replace(',','.')):0;
  })();

  // Parse the utilisation table properly
  const utilM = p10.match(/Śr\. zużycie paliwa \(l\/hr\)\s*([\d.,]+)\s*([\d.,]+)\s*([\d.,]+)/);
  const utilHM = p10.match(/Wykorzystanie maszyny \(hr\)\s*([\d.,]+)\s*([\d.,]+)\s*([\d.,]+)/);
  const loadM  = p10.match(/Średni współczynnik obciążenia silnika \(%\)\s*([\d.,]+)\s*([\d.,]+)\s*([\d.,]+)/);
  const spdM   = p10.match(/Średnia prędkość jazdy \(km\/hr\)\s*([\d.,]+)\s*([\d.,]+)\s*([\d.,]+)/);
  const fuelLM = p10.match(/Zużyte paliwo \(l\)\s*([\d.,]+)\s*([\d.,]+)\s*([\d.,]+)/);

  const pf = (m,i)=>m?parseFloat(m[i].replace(',','.')):0;

  const idle_fuel_v  = pf(utilM,1);
  const work_fuel_v  = pf(utilM,2);
  const trans_fuel_v = pf(utilM,3);
  const idle_h  = pf(utilHM,1);
  const work_h  = pf(utilHM,2);
  const trans_h = pf(utilHM,3);
  const total_h = idle_h+work_h+trans_h||1;
  const load_idle  = pf(loadM,1)/100;
  const load_work  = pf(loadM,2)/100;
  const load_trans = pf(loadM,3)/100;
  const spd_work  = pf(spdM,2);
  const spd_trans = pf(spdM,3);
  const fuel_idle_l = pf(fuelLM,1);
  const fuel_work_l = pf(fuelLM,2);
  const fuel_trans_l= pf(fuelLM,3);

  // fuel per period (page 5)
  const p5 = pages[4]||'';
  const fuel_total = num('Paliwo zużyte w okresie \\(l\\)',p5);
  const fuel_avg   = num('Śr\\. zużycie paliwa \\(l\\/hr\\)',p5);
  const def_level  = num('Poziom płynu DEF w zbiorniku \\(%\\)',p5);
  const def_rate   = num('Średnie tempo zużycia roztworu DEF \\(l\\/hr\\)',p5);
  const def_total  = num('Płyn DEF zużyty w okresie \\(l\\)',p5);

  // average fuel per mode
  const fuel_per_period = fuel_avg; // overall average
  const fuel_work_avg  = work_h>0  ? fuel_work_l/work_h  : 0;
  const fuel_idle_avg  = idle_h>0  ? fuel_idle_l/idle_h  : 0;
  const fuel_trans_avg = trans_h>0 ? fuel_trans_l/trans_h: 0;

  // temperatures (page 8)
  const p8 = pages[7]||'';
  const cool_max  = num('Maksymalna temp\\. płynu chłodniczego \\(C\\)',p8);
  const hyd_max   = num('Maksymalna temp\\. oleju hydraulicznego \\(C\\)',p8);
  const gear_max  = num('Maksymalna temp\\. oleju przekładniowego \\(C\\)',p8);
  const cool_avg  = num('Średnia temp\\. płynu chłodzącego \\(C\\)',p8);
  const gear_avg  = num('Średnia temp\\. oleju przekładniowego \\(C\\)',p8);
  const hyd_avg   = num('Średnia temp\\. oleju hydraulicznego \\(C\\)',p8);

  // slip (page 1)
  const slip_201  = num('2\\.01-4\\.00%%');
  const slip_401  = num('4\\.01-6\\.00%%')+num('6\\.01-8\\.00%%');
  const slip_801  = num('8\\.01-10\\.00%%')+num('10\\.01-12\\.00%%')+num('12\\.01-14\\.00%%')+num('14\\.01-16\\.00%%')+num('16\\.01-18\\.00%%');
  const slip_1801 = num('18\\.01-100\\.00%%');

  // AutoTrac (page 4)
  const p4 = pages[3]||'';
  const autotrac_on  = num('AutoTrac \\(hr\\)\\s*([\\d.,]+)',p4) || (() => {
    const m=p4.match(/AutoTrac \(hr\)\s*([\d.,]+)\s*([\d.,]+)/);
    return m?parseFloat(m[1]):0;
  })();
  const autotrac_off_v = (() => {
    const m=p4.match(/AutoTrac \(hr\)\s*([\d.,]+)\s*([\d.,]+)/);
    return m?parseFloat(m[2]):0;
  })();
  const autotrac_pct = (autotrac_on+autotrac_off_v)>0 ? autotrac_on/(autotrac_on+autotrac_off_v)*100 : 0;

  // WOM (page 4)
  const womM = p4.match(/Tylny WOM \(hr\)\s*([\d.,]+)\s*([\d.,]+)/);
  const wom_on  = womM?parseFloat(womM[1]):0;
  const wom_off = womM?parseFloat(womM[2]):0;

  // StarFire accuracy (page 4)
  const sfM = {
    p40:  num('0% - 40%',p4),
    p70:  num('50% - 70%',p4),
    p80:  num('80%',p4),
    p90:  num('90%',p4),
    p100: num('100%',p4),
  };
  const sf_h = [sfM.p40, sfM.p70, sfM.p80, sfM.p90, sfM.p100];
  const sf_total = sf_h.reduce((a,b)=>a+b,0)||1;
  const sf_p = sf_h.map(v=>v/sf_total*100);

  // sadza (page 3)
  const p3 = pages[2]||'';
  const sadza = {
    n0: num('Poziom sadzy niski \\(0\\)',p3),
    n1: num('Poziom sadzy niski \\(1\\)',p3),
    n2: num('Poziom sadzy średni \\(2\\)',p3),
    n3: num('Poziom sadzy wysoki \\(3\\)',p3),
    n4: num('Poziom sadzy bardzo wysoki \\(4\\)',p3),
    n5: 0,
  };

  return {
    machine:{serial, model:'8R', type:'Ciągnik',
      org:'John Deere Operations Center',
      date_s: dateparts?dateparts[1].trim():'',
      date_e: dateparts?dateparts[2].trim():'',
      date_range: dateRange,
    },
    util:{idle_h,work_h,trans_h,total_h,
      idle_p:+(idle_h/total_h*100).toFixed(1),
      work_p:+(work_h/total_h*100).toFixed(1),
      trans_p:+(trans_h/total_h*100).toFixed(1),
      cost:+(fuel_idle_avg*idle_h*5.5).toFixed(0),
    },
    fuel:{idle:+fuel_idle_avg.toFixed(2), work:+fuel_work_avg.toFixed(2),
          trans:+fuel_trans_avg.toFixed(2), per:+fuel_avg.toFixed(2),
          total:fuel_total},
    load:{idle:+load_idle.toFixed(3), work:+load_work.toFixed(3), trans:+load_trans.toFixed(3)},

// ══ CHARTS ════════════════════════════════════════════════════════════════════
const G='#367C2B',O='#e07b39',GR='#9e9e9e',YB='rgba(255,245,150,0.75)',LG='#d0d0d0';

function donut(id,labels,vals,colors){
  const ctx=document.getElementById(id); if(!ctx)return;
  new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},
    options:{cutout:'55%',plugins:{legend:{position:'right',labels:{font:{size:9},boxWidth:11,padding:7}},tooltip:{callbacks:{label:i=>`${i.label}: ${i.raw.toFixed(1)}`}}}}});
}
function hbar(id,labels,vals){
  const ctx=document.getElementById(id); if(!ctx)return;
  new Chart(ctx,{type:'bar',data:{labels,datasets:[{data:vals,backgroundColor:G,barThickness:13,borderRadius:2}]},
    options:{indexAxis:'y',plugins:{legend:{display:false}},
      scales:{x:{display:false,max:Math.max(...vals)*1.25},y:{ticks:{font:{size:8.5}},grid:{display:false}}}}});
}
function dual(id,cats,fv,lv){
  const ctx=document.getElementById(id); if(!ctx)return;
  new Chart(ctx,{type:'bar',data:{labels:cats,datasets:[
    {label:'Paliwo',data:fv,backgroundColor:G,yAxisID:'y1',order:2,barThickness:20},
    {label:'Obciążenie',data:lv,type:'line',borderColor:'#555',backgroundColor:'transparent',
     pointBackgroundColor:'#555',pointRadius:5,yAxisID:'y2',order:1,segment:{borderDash:[4,3]}}
  ]},options:{plugins:{legend:{labels:{font:{size:9},boxWidth:11}}},
    scales:{y1:{position:'left',ticks:{font:{size:8}},title:{display:true,text:'Paliwo',font:{size:8}}},
      y2:{position:'right',min:0,max:1.1,ticks:{font:{size:8}},title:{display:true,text:'Obciążenie',font:{size:8}},grid:{display:false}}}}});
}
function norm(id,cats,norms,acts){
  const ctx=document.getElementById(id); if(!ctx)return;
  new Chart(ctx,{type:'bar',data:{labels:cats,datasets:[
    {label:'Norma',data:norms,backgroundColor:YB,borderColor:'#cccc44',borderWidth:1,barThickness:28,order:2},
    {label:'Faktyczne spalanie',data:acts,type:'line',borderColor:'#333',backgroundColor:'transparent',
     pointBackgroundColor:'#333',pointRadius:5,order:1,segment:{borderDash:[5,3]}}
  ]},options:{plugins:{legend:{labels:{font:{size:9},boxWidth:11}}},
    scales:{x:{ticks:{font:{size:8}},grid:{display:false}},y:{ticks:{font:{size:8}}}}}});
}
function scatter(id,load,fuel){
  const ctx=document.getElementById(id); if(!ctx)return;
  const inW=load>=0.6&&load<=0.8&&fuel>=1&&fuel<=50;
  new Chart(ctx,{type:'scatter',data:{datasets:[{label:'Punkt pracy',data:[{x:load,y:fuel}],
    backgroundColor:inW?G:O,pointRadius:9,pointHoverRadius:11}]},
    options:{plugins:{legend:{display:false}},
      scales:{x:{min:0,max:1,ticks:{font:{size:8}},title:{display:true,text:'Obciążenie silnika',font:{size:8}}},
        y:{min:0,max:100,ticks:{font:{size:8}},title:{display:true,text:'Paliwo (l/godz.)',font:{size:8}}}},
      // green window drawn as annotation via plugin manually
      }});
  // draw green window overlay on canvas
  setTimeout(()=>{
    const c=ctx.getContext('2d');
    const ch=Chart.getChart(ctx);
    if(!ch)return;
    const xa=ch.scales.x, ya=ch.scales.y;
    const x1=xa.getPixelForValue(0.6), x2=xa.getPixelForValue(0.8);
    const y1=ya.getPixelForValue(50),  y2=ya.getPixelForValue(1);
    c.save();
    c.fillStyle='rgba(54,124,43,0.08)';
    c.strokeStyle='rgba(54,124,43,0.4)';
    c.setLineDash([4,3]);
    c.lineWidth=1;
    c.fillRect(x1,y1,x2-x1,y2-y1);
    c.strokeRect(x1,y1,x2-x1,y2-y1);
    c.restore();
  },200);
}
function slipBar(id,labels,vals){
  const ctx=document.getElementById(id); if(!ctx)return;
  new Chart(ctx,{type:'bar',data:{labels,datasets:[{data:vals,backgroundColor:G,barThickness:26,borderRadius:2}]},
    options:{plugins:{legend:{display:false}},
      scales:{x:{ticks:{font:{size:7.5}},grid:{display:false},title:{display:true,text:'Poziom',font:{size:8}}},
        y:{ticks:{font:{size:8}},title:{display:true,text:'Liczba godzin',font:{size:8}}}}}});
}
function sadza(id,labels,vals,colors){
  const ctx=document.getElementById(id); if(!ctx)return;
  const nz=labels.map((l,i)=>({l,v:vals[i],c:colors[i]})).filter(x=>x.v>0);
  if(!nz.length)return;
  const tot=nz.reduce((a,x)=>a+x.v,0);
  new Chart(ctx,{type:'pie',data:{labels:nz.map(x=>x.l),datasets:[{data:nz.map(x=>x.v),backgroundColor:nz.map(x=>x.c),borderWidth:1.5,borderColor:'#fff'}]},
    options:{plugins:{legend:{position:'right',labels:{font:{size:8.5},boxWidth:11,padding:5,
      generateLabels:ch=>ch.data.datasets[0].data.map((v,i)=>({
        text:`${ch.data.labels[i]} (${(v/tot*100).toFixed(1)}%)`,
        fillStyle:ch.data.datasets[0].backgroundColor[i],lineWidth:0}))}}}}});
}
function atGauge(id,pct){
  const ctx=document.getElementById(id); if(!ctx)return;
  new Chart(ctx,{type:'doughnut',data:{datasets:[{data:[Math.min(pct,100),Math.max(0,100-pct)],
    backgroundColor:[G,LG],borderWidth:0,circumference:180,rotation:-90}]},
    options:{cutout:'68%',plugins:{legend:{display:false},tooltip:{enabled:false}}}});
}
function atBar(id,on,off){
  const ctx=document.getElementById(id); if(!ctx)return;
  new Chart(ctx,{type:'bar',data:{labels:['AutoTrac™'],datasets:[
    {label:'Aktywny',data:[on],backgroundColor:G,barThickness:18},
    {label:'Nieaktywny',data:[off],backgroundColor:LG,barThickness:18},
  ]},options:{indexAxis:'y',plugins:{legend:{labels:{font:{size:8.5},boxWidth:10}}},
    scales:{x:{stacked:true,ticks:{font:{size:8}}},y:{stacked:true,display:false}}}});
}
function tempChart(id,labels,los,his,vals){
  const ctx=document.getElementById(id); if(!ctx)return;
  new Chart(ctx,{type:'bar',data:{labels,datasets:[
    {label:'Zakres normy',data:los.map((l,i)=>his[i]-l),backgroundColor:YB,borderColor:'#cccc44',borderWidth:1,
     base:los,barThickness:28,order:2},
    {label:'Temperatura płynu',data:vals,type:'line',borderColor:'#333',backgroundColor:'transparent',
     pointBackgroundColor:'#333',pointRadius:6,order:1,segment:{borderDash:[5,3]}}
  ]},options:{plugins:{legend:{labels:{font:{size:9},boxWidth:11}}},
    scales:{x:{ticks:{font:{size:8}},title:{display:true,text:'Rodzaj płynu',font:{size:8}}},
      y:{ticks:{font:{size:8}},title:{display:true,text:'Zakres i normy',font:{size:8}}}}}});
}

function drawCharts(){
  const d=D,u=d.util,at=d.autotrac,sf=d.sf,f=d.fuel,l=d.load,sl=d.slip,t=d.temps,s=d.sadza;
  donut('c_dp',['Bezczynność','Praca','Transport'],[u.idle_p,u.work_p,u.trans_p],[O,G,GR]);
  donut('c_dh',['Bezczynność','Praca','Transport'],[u.idle_h,u.work_h,u.trans_h],[O,G,GR]);
  hbar('c_sfh',['< 40%','50-70%','80%','90%','100%'],sf.h);
  hbar('c_sfp',['< 40%','50-70%','80%','90%','100%'],sf.p);
  atGauge('c_at',at.pct);
  atBar('c_atb',at.on,at.off);
  dual('c_fd',['Transport','Praca','Bezczynność'],[f.trans,f.work,f.idle],[l.trans,l.work,l.idle]);
  norm('c_fn',['Praca','Okres','Transport','Bezczynność'],[50,30,30,7],[f.work,f.per,f.trans,f.idle]);
  sadza('c_sadza',['Niski (0)','Niski (1)','Średni (2)','Wysoki (3)','Bardzo wysoki (4)'],[s.n0,s.n1,s.n2,s.n3,s.n4],['#2e7d32','#388e3c','#9e9e9e','#f9a825','#e65100']);
  scatter('c_sc',l.work,f.work);
  slipBar('c_sl',['2,01-4%','4,01-8%','8,01-18%','18-100%'],[sl.s201,sl.s401,sl.s801,sl.s1801]);
  tempChart('c_ta',['Chłodniczy','Przekładniowy','Hydrauliczny'],[80,40,30],[105,60,95],[t.cool_avg,t.gear_avg,t.hyd_avg]);
  tempChart('c_tm',['Chłodniczy','Hydrauliczny','Przekładniowy'],[85,70,50],[105,95,70],[t.cool_max,t.hyd_max,t.gear_max]);
}
